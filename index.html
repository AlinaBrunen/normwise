function renderCard(c) {
  return `<div class="card"><div class="card-icon">${c.icon}</div><h3>${c.h}</h3><p>${c.p}</p></div>`;
}

function setLang(lang, btn) {
  const t = T[lang];

  // Nav
  document.getElementById('nav-login').textContent = t.navLogin;
  document.getElementById('nav-start').textContent = t.navStart;
  document.querySelectorAll('.nav-lang').forEach(b => b.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
  } else {
    document.querySelectorAll('.nav-lang').forEach(b => {
      if (b.textContent.toLowerCase().includes(lang)) b.classList.add('active');
    });
  }

  // ✅ Footer brand text — now translated!
  document.getElementById('footer-brand-text').textContent = t.footerBrand;

  // Hero
  document.getElementById('hero-chip').innerHTML = t.heroChip;
  document.getElementById('hero-h1').innerHTML = t.heroH1;
  document.getElementById('hero-sub').innerHTML = t.heroSub;
  document.getElementById('hero-cta').innerHTML = t.heroCta;
  document.getElementById('hero-note').textContent = t.heroNote;
  document.getElementById('demo-bar-title').textContent = t.demoTitle;
  document.getElementById('demo-msgs').innerHTML = `
    <div class="dmsg u"><div class="dav u">A</div><div class="dbub">${t.demoQ}</div></div>
    <div class="dmsg"><div class="dav ai">N</div><div class="dbub">${t.demoA}</div></div>`;
  document.getElementById('demo-placeholder').textContent = t.demoPlaceholder;
  document.getElementById('demo-send-btn').textContent = t.demoSend;

  // Stats
  document.getElementById('stat1').textContent = t.stat1;
  document.getElementById('stat2').textContent = t.stat2;
  document.getElementById('stat3').textContent = t.stat3;
  document.getElementById('stat4').textContent = t.stat4;

  // Problem/Solution (EN only)
  const problemSection = document.getElementById('problem-section');
  const solutionSection = document.getElementById('solution-section');
  if (lang === 'en') {
    problemSection.style.display = '';
    solutionSection.style.display = '';
    document.getElementById('problem-chip').textContent = t.problemChip;
    document.getElementById('problem-h2').innerHTML = t.problemH2;
    document.getElementById('problem-lead').textContent = t.problemLead;
    document.getElementById('problem-grid').innerHTML = t.problems.map(p =>
      `<div class="problem-card"><div class="problem-icon">${p.icon}</div><div><h3>${p.h}</h3><p>${p.p}</p></div></div>`
    ).join('');
    document.getElementById('solution-chip').textContent = t.solutionChip;
    document.getElementById('solution-h2').innerHTML = t.solutionH2;
    document.getElementById('solution-lead').innerHTML = t.solutionLead;
    document.getElementById('solution-grid').innerHTML = t.solutions.map(renderCard).join('');
  } else {
    problemSection.style.display = 'none';
    solutionSection.style.display = 'none';
  }

  // Features
  document.getElementById('features-chip').textContent = t.featuresChip;
  document.getElementById('features-h2').innerHTML = t.featuresH2;
  document.getElementById('features-lead').innerHTML = t.featuresLead;
  document.getElementById('features-grid').innerHTML = t.features.map(renderCard).join('');

  // Standards
  document.getElementById('standards-chip').textContent = t.standardsChip;
  document.getElementById('standards-h2').innerHTML = t.standardsH2;
  document.getElementById('standards-grid').innerHTML = t.standards.map(s =>
    `<div class="card"><div class="std-badge ${s.type}">${s.badge}</div><h3>${s.h}</h3><p class="std-card-p">${s.p}</p></div>`
  ).join('');

  // Steps
  document.getElementById('steps-chip').textContent = t.stepsChip;
  document.getElementById('steps-h2').innerHTML = t.stepsH2;
  document.getElementById('steps-grid').innerHTML = t.steps.map((s,i) =>
    `<div class="step"><div class="step-num">0${i+1}</div><h3>${s.h}</h3><p>${s.p}</p></div>`
  ).join('');

  // Pricing
  document.getElementById('pricing-chip').textContent = t.pricingChip;
  document.getElementById('pricing-h2').innerHTML = t.pricingH2;
  document.getElementById('pricing-lead').innerHTML = t.pricingLead;
  document.getElementById('pricing-grid').innerHTML = t.plans.map(p => `
    <div class="plan${p.hot?' hot':''}">
      ${p.badge ? `<div class="plan-badge">${p.badge}</div>` : ''}
      <div class="plan-name">${p.name}</div>
      <div class="plan-price">${p.price}<span class="plan-price-period">${p.period}</span></div>
      <div class="plan-period">${p.users}</div>
      <ul class="plan-features">${p.features.map(f=>`<li>${f}</li>`).join('')}</ul>
      <a href="${p.link}" class="btn-plan ${p.btnClass}">${p.btn}</a>
    </div>`).join('');
  document.getElementById('trial-note').textContent = t.trialNote;

  // Testimonials
  document.getElementById('testimonials-chip').textContent = t.testimonialsChip;
  document.getElementById('testimonials-h2').innerHTML = t.testimonialsH2;
  document.getElementById('testimonials-grid').innerHTML = t.testimonials.map(tm => `
    <div class="tcard">
      <p class="tcard-text">${tm.q}</p>
      <div class="tauthor"><div class="tav" style="background:${tm.bg}">${tm.av}</div>
      <div><div class="tname">${tm.name}</div><div class="trole">${tm.role}</div></div></div>
    </div>`).join('');

  // CTA
  document.getElementById('cta-chip').textContent = t.ctaChip;
  document.getElementById('cta-h2').innerHTML = t.ctaH2;
  document.getElementById('cta-p').innerHTML = t.ctaP;
  document.getElementById('cta-btns').innerHTML = t.ctaBtns;

  // Footer columns
  document.getElementById('footer-col1').innerHTML = t.footerCol1;
  document.getElementById('footer-col2').innerHTML = t.footerCol2;
  document.getElementById('footer-col3').innerHTML = t.footerCol3;

  // ✅ Save language so it persists across ALL pages
  localStorage.setItem('nw_lang', lang);
}

// ✅ On load: read saved language and apply immediately
const saved = localStorage.getItem('nw_lang');
const browser = (navigator.language || 'en').substring(0,2).toLowerCase();
setLang(saved || (['de','fr'].includes(browser) ? browser : 'en'), null);
</script>
</body>
</html>
