<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#070c18"/>
<title>NormWise — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
html,body{background-color:#070c18 !important;min-height:100svh}
:root{--blue:#1a3fa8;--red:#c0392b;--red-glow:rgba(192,57,43,.35);--ink:#070c18;--surface:#111827;--surface2:#161e30;--muted:rgba(255,255,255,.38);--muted2:rgba(255,255,255,.68);--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.11)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:#070c18 !important;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100svh;padding:20px;-webkit-text-size-adjust:100%}
.auth-wrap{width:100%;max-width:420px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo a{text-decoration:none;display:inline-flex;align-items:center;gap:10px}
.auth-wordmark{font-weight:700;font-size:24px;color:#fff;letter-spacing:-.5px}
.auth-wordmark span{color:var(--red)}
.auth-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:36px}
.auth-chip{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px}
.auth-box h1{font-size:26px;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.auth-box p{font-size:14px;color:var(--muted2);margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:13px 16px;font-family:'Space Grotesk',sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color .2s}
.form-group input::placeholder{color:var(--muted)}
.form-group input:focus{border-color:rgba(26,63,168,.5)}
.forgot-link{display:block;text-align:right;font-size:12px;color:var(--muted2);text-decoration:none;margin-top:-10px;margin-bottom:20px}
.forgot-link:hover{color:#fff}
.btn-submit{width:100%;background:var(--red);border:none;border-radius:8px;padding:14px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#fff;cursor:pointer;box-shadow:0 0 24px var(--red-glow);transition:all .2s}
.btn-submit:hover{background:#a93226}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.auth-divider{text-align:center;margin:20px 0;position:relative}
.auth-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border2)}
.auth-divider span{background:var(--surface);padding:0 12px;position:relative;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.auth-footer{text-align:center;font-size:13px;color:var(--muted2)}
.auth-footer a{color:#6a9fd8;text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.alert.error{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#f87171}
.demo-link{display:block;text-align:center;margin-top:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;transition:color .2s}
.demo-link:hover{color:var(--muted2)}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <a href="index.html">
      <svg width="28" height="28" viewBox="0 0 200 200"><rect x="10" y="10" width="180" height="180" rx="36" fill="#111827"/><circle cx="100" cy="14" r="10" fill="#1a3fa8"/><circle cx="146" cy="26" r="9" fill="#3a6fd4"/><circle cx="172" cy="62" r="12" fill="#c0392b"/></svg>
      <span class="auth-wordmark">Norm<span>Wise</span></span>
    </a>
  </div>

  <div class="auth-box">
    <div class="auth-chip" id="login-chip">// sign_in</div>
    <h1 id="login-title">Welcome back</h1>
    <p id="login-subtitle">Log in to your NormWise account</p>

    <div class="alert error" id="alert-error"></div>

    <div class="form-group">
      <label id="label-email">Email</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label id="label-password">Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()"/>
    </div>
    <a href="reset.html" class="forgot-link" id="forgot-link">Forgot password?</a>

    <button class="btn-submit" id="login-btn" onclick="handleLogin()">
      <span id="btn-text">Log In</span>
    </button>

    <div class="auth-divider"><span id="divider-text">new to NormWise?</span></div>
    <div class="auth-footer">
      <a href="register.html" id="register-link">Create a free account</a>
    </div>
    <a href="demo.html" class="demo-link" id="demo-link">→ Try the free demo first (no account needed)</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://iasasvucmmvehppvbwtm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_SUjuHrANbxufHJtpRPdbwQ_g0PQ6C1X';

const t = {
  en: { chip:'// sign_in', title:'Welcome back', subtitle:'Log in to your NormWise account', labelEmail:'Email', labelPassword:'Password', btn:'Log In', forgot:'Forgot password?', divider:'new to NormWise?', register:'Create a free account', demo:'→ Try the free demo first (no account needed)', placeholderEmail:'you@company.com', placeholderPassword:'Your password' },
  de: { chip:'// anmelden', title:'Willkommen zurück', subtitle:'Melden Sie sich bei Ihrem NormWise-Konto an', labelEmail:'E-Mail', labelPassword:'Passwort', btn:'Anmelden', forgot:'Passwort vergessen?', divider:'neu bei NormWise?', register:'Kostenloses Konto erstellen', demo:'→ Zuerst die kostenlose Demo testen', placeholderEmail:'sie@unternehmen.de', placeholderPassword:'Ihr Passwort' },
  fr: { chip:'// connexion', title:'Bienvenue', subtitle:'Connectez-vous à votre compte NormWise', labelEmail:'E-mail', labelPassword:'Mot de passe', btn:'Se connecter', forgot:'Mot de passe oublié ?', divider:'nouveau sur NormWise ?', register:'Créer un compte gratuit', demo:'→ Essayer la démo gratuite d\'abord', placeholderEmail:'vous@entreprise.fr', placeholderPassword:'Votre mot de passe' }
};

function applyLang(lang) {
  const l = t[lang] || t.en;
  document.getElementById('login-chip').textContent = l.chip;
  document.getElementById('login-title').textContent = l.title;
  document.getElementById('login-subtitle').textContent = l.subtitle;
  document.getElementById('label-email').textContent = l.labelEmail;
  document.getElementById('label-password').textContent = l.labelPassword;
  document.getElementById('btn-text').textContent = l.btn;
  document.getElementById('forgot-link').textContent = l.forgot;
  document.getElementById('divider-text').textContent = l.divider;
  document.getElementById('register-link').textContent = l.register;
  document.getElementById('demo-link').textContent = l.demo;
  document.getElementById('email').placeholder = l.placeholderEmail;
  document.getElementById('password').placeholder = l.placeholderPassword;
}

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  document.getElementById('btn-text').textContent = '...';
  document.getElementById('alert-error').style.display = 'none';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.error) {
      document.getElementById('alert-error').textContent = 'Invalid email or password. Please try again.';
      document.getElementById('alert-error').style.display = 'block';
      btn.disabled = false;
      const lang = localStorage.getItem('nw_lang') || 'en';
      document.getElementById('btn-text').textContent = t[lang].btn;
    } else {
      localStorage.setItem('nw_token', data.access_token);
      localStorage.setItem('nw_user', JSON.stringify(data.user));
      window.location.href = 'chat.html';
    }
  } catch(e) {
    document.getElementById('alert-error').textContent = 'Connection error. Please try again.';
    document.getElementById('alert-error').style.display = 'block';
    btn.disabled = false;
  }
}

const lang = localStorage.getItem('nw_lang') || 'en';
applyLang(lang);
</script>
</body>
</html>
